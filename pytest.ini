[pytest]
# Configurações do pytest

# Diretório de testes
testpaths = tests

# Padrão de descoberta
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers customizados
markers =
    unit: Testes unitários
    integration: Testes de integração
    e2e: Testes end-to-end
    slow: Testes que demoram
    api: Testes de API
    database: Testes com banco de dados
    asyncio: Testes assincronos

# Configurações do Playwright
asyncio_mode = auto

# Configurações de browsers
playwright_browsers = chromium

# Output
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --cov=app
    --cov-report=html
    --cov-report=term-missing
    --cov-report=xml
    --cov-branch
    --cov-fail-under=70

# Timeout para testes (em segundos)
timeout = 30

# Concurrency
# Descomente para rodar testes em paralelo
# addopts = -n auto

# Ignore patterns
norecursedirs = .git .venv venv __pycache__ *.egg-info

# Log
log_cli = true
log_cli_level = INFO
