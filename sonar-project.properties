sonar.projectKey=professor-simulator-clicker
sonar.projectName=Professor Simulator Clicker
sonar.projectVersion=1.0.0

# Paths
sonar.sources=app
sonar.tests=tests
sonar.python.version=3.10

# Coverage
sonar.python.coverage.reportPaths=coverage.xml

# Code quality tools
# Gere esses arquivos com ./run-tests.sh antes de rodar o scanner localmente.
sonar.python.pylint.reportPaths=pylint-report.txt
sonar.python.flake8.reportPaths=flake8-report.txt
sonar.python.bandit.reportPaths=bandit-report.json

# Exclusions
sonar.coverage.exclusions=**/__pycache__/**,**/venv/**,**/.venv/**,**/tests/**
sonar.exclusions=**/__pycache__/**,**/venv/**,**/.venv/**

# Analysis settings
sonar.sourceEncoding=UTF-8