sonar.projectKey=professor-simulator-clicker
sonar.projectName=Professor Simulator Clicker
sonar.projectVersion=1.0.0

# Paths
sonar.sources=app
sonar.tests=tests
sonar.python.version=3.10

# Coverage
sonar.python.coverage.reportPaths=coverage.xml
sonar.coverageReportPaths=coverage.xml

# Code quality tools
sonar.python.pylint.reportPath=pylint-report.txt
sonar.python.flake8.reportPath=flake8-report.txt
sonar.python.bandit.reportPath=bandit-report.json

# Exclusions
sonar.coverage.exclusions=**/__pycache__/**,**/venv/**,**/tests/**
sonar.exclusions=**/__pycache__/**,**/venv/**

# Quality thresholds
sonar.coverage.lines=70
sonar.coverage.branches=65

# Analysis settings
sonar.sourceEncoding=UTF-8
sonar.login=admin
sonar.password=admin
