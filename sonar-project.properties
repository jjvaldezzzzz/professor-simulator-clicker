sonar.projectKey=professor-simulator-clicker
sonar.projectName=Professor Simulator Clicker
sonar.projectVersion=1.0.0

# Paths
sonar.sources=app
sonar.tests=tests
sonar.python.version=3.10

# Coverage (Mantida APENAS a propriedade específica para Python)
sonar.python.coverage.reportPaths=coverage.xml

# Code quality tools 
# Atualizado de 'reportPath' para 'reportPaths' para corrigir o aviso de descontinuação.
# Deixei comentados para não quebrar a análise (como aconteceu no log com o pylint). 
# Remova o '#' da frente apenas quando você realmente gerar esses arquivos no seu terminal.
#sonar.python.pylint.reportPaths=pylint-report.txt
#sonar.python.flake8.reportPaths=flake8-report.txt
#sonar.python.bandit.reportPaths=bandit-report.json

# Exclusions
sonar.coverage.exclusions=**/__pycache__/**,**/venv/**,**/tests/**
sonar.exclusions=**/__pycache__/**,**/venv/**

# Analysis settings
sonar.sourceEncoding=UTF-8