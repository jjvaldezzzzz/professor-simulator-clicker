<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professor Clicker - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="flash-container auth-screen">
        <div class="panel auth-panel">
            <h1>Professor Clicker</h1>
            <p class="subtitle">Area do treinador</p>

            <form id="auth-form" onsubmit="return false;">
                <input type="email" id="email" placeholder="E-mail (ex: aluno@ufpa.br)" autocomplete="email">
                <span id="erro-email" class="error-text"></span>

                <input type="password" id="senha" placeholder="Senha" autocomplete="current-password">
                <span id="erro-senha" class="error-text"></span>

                <button type="button" class="btn-retro btn-primary" style="width: 100%;" onclick="fazerLogin()">Entrar</button>

                <hr style="margin: 12px 0;">

                <input type="text" id="nome" placeholder="Nome (somente para cadastro)" autocomplete="name">
                <span id="erro-nome" class="error-text"></span>

                <button type="button" class="btn-retro" style="width: 100%;" onclick="fazerCadastro()">Criar Conta</button>
            </form>

            <p id="mensagem" class="message"></p>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        function limparErros() {
            document.querySelectorAll('.error-text').forEach(el => el.innerText = "");
            document.querySelectorAll('input').forEach(el => el.classList.remove('input-invalid'));
            const msg = document.getElementById('mensagem');
            msg.className = 'message';
            msg.innerText = "";
        }

        function setMensagem(texto, tipo) {
            const msg = document.getElementById('mensagem');
            msg.className = `message ${tipo}`;
            msg.innerText = texto;
        }

        function mostrarErro(campoId, erroId, mensagem) {
            document.getElementById(campoId).classList.add('input-invalid');
            document.getElementById(erroId).innerText = mensagem;
        }

        function validarEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }

        function validarFormulario(isCadastro) {
            limparErros();
            let valido = true;

            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha').value.trim();
            const nome = document.getElementById('nome').value.trim();

            if (!email) {
                mostrarErro('email', 'erro-email', 'O e-mail e obrigatorio.');
                valido = false;
            } else if (!validarEmail(email)) {
                mostrarErro('email', 'erro-email', 'Digite um e-mail valido.');
                valido = false;
            }

            if (!senha) {
                mostrarErro('senha', 'erro-senha', 'A senha e obrigatoria.');
                valido = false;
            } else if (senha.length < 3) {
                mostrarErro('senha', 'erro-senha', 'A senha deve ter no minimo 3 caracteres.');
                valido = false;
            }

            if (isCadastro && !nome) {
                mostrarErro('nome', 'erro-nome', 'O nome e obrigatorio para cadastro.');
                valido = false;
            }

            return valido;
        }

        async function fazerLogin() {
            if (!validarFormulario(false)) return;

            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha').value.trim();

            try {
                const data = await apiFetch('/jogadores/login', {
                    method: 'POST',
                    body: { email, senha }
                });

                setJogadorId(data.jogador_id);
                setIsAdmin(!!data.is_admin);
                await carregarJogador();
                window.location.href = 'game.html';
            } catch (error) {
                setMensagem(error.message || 'Erro ao logar.', 'error');
            }
        }

        async function fazerCadastro() {
            if (!validarFormulario(true)) return;

            const nome = document.getElementById('nome').value.trim();
            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha').value.trim();

            try {
                await apiFetch('/jogadores/', {
                    method: 'POST',
                    body: { nome, email, senha }
                });

                setMensagem('Cadastro realizado! Agora voce pode entrar.', 'success');
                document.getElementById('nome').value = '';
                document.getElementById('senha').value = '';
            } catch (error) {
                if (error.status === 422) {
                    setMensagem('Erro nos dados. Verifique e tente novamente.', 'error');
                } else {
                    setMensagem(error.message || 'Erro ao cadastrar.', 'error');
                }
            }
        }
    </script>
</body>
</html>
