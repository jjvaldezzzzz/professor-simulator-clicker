<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Professor Clicker - Loja</title>
	<link rel="stylesheet" href="css/style.css">
</head>
<body>
	<div class="flash-container">
		<div class="top-nav">
			<a href="game.html" class="btn-retro">Dar Aula</a>
			<a href="shop.html" class="btn-retro">Loja</a>
			<a href="inventory.html" class="btn-retro">Mochila</a>
			<a href="pokemon.html" class="btn-retro">Time Pokemon</a>
			<a href="profile.html" class="btn-retro">Perfil</a>
			<button class="btn-retro btn-danger" type="button" onclick="sair()">Sair</button>
			<div class="saldo">Moedas: <span id="saldo-display">--</span></div>
		</div>

		<div class="content">
			<div class="panel">
				<h2>Loja do Professor</h2>
				<button id="btn-criar-item" class="btn-retro btn-success" type="button" onclick="abrirModalItem()" style="float: right; margin-bottom: 10px;">+ Criar Item (Admin)</button>
				<table id="tabela-loja">
					<tr>
						<th>Item</th>
						<th>Descricao</th>
						<th>Preco</th>
						<th>Acoes</th>
					</tr>
				</table>
				<p id="mensagem" class="message"></p>
			</div>
		</div>
	</div>

	<div id="modal-item" class="modal is-hidden" role="dialog" aria-modal="true">
		<div class="modal-card">
			<h3 id="modal-item-titulo" class="modal-title">Criar novo item</h3>
			<div class="form-row">
				<input id="item-nome" type="text" placeholder="Nome do item">
			</div>
			<div class="form-row">
				<textarea id="item-descricao" rows="3" placeholder="Descricao do item"></textarea>
			</div>
			<div class="form-row">
				<select id="item-tipo">
					<option value="equipamento">Multiplicador (ganho por clique)</option>
					<option value="auto_click">Auto clique (cliques por segundo)</option>
				</select>
			</div>
			<div class="form-row">
				<input id="item-preco" type="number" min="0" step="0.01" placeholder="Preco">
			</div>
			<div class="form-row">
				<input id="item-multiplicador" type="number" min="0" step="0.1" placeholder="Multiplicador (ex: 2.0)">
			</div>
			<p id="item-tipo-info" class="panel-note">Multiplicador soma no ganho por clique.</p>
			<p id="mensagem-modal-item" class="message"></p>
			<div class="modal-actions">
				<button class="btn-retro btn-success" type="button" onclick="confirmarItem()">Confirmar</button>
				<button class="btn-retro" type="button" onclick="fecharModalItem()">Cancelar</button>
			</div>
		</div>
	</div>

	<script src="js/api.js"></script>
	<script>
		verificarAutenticacao();
		atualizarSaldoNaTela(getSaldo());
		carregarJogador();

		const jogadorId = getJogadorId();
		const isAdmin = getIsAdmin();
		const tabela = document.getElementById('tabela-loja');
		const mensagem = document.getElementById('mensagem');
		const btnCriarItem = document.getElementById('btn-criar-item');
		const modalItem = document.getElementById('modal-item');
		const modalItemTitulo = document.getElementById('modal-item-titulo');
		const modalItemNome = document.getElementById('item-nome');
		const modalItemDescricao = document.getElementById('item-descricao');
		const modalItemTipo = document.getElementById('item-tipo');
		const modalItemPreco = document.getElementById('item-preco');
		const modalItemMultiplicador = document.getElementById('item-multiplicador');
		const modalItemTipoInfo = document.getElementById('item-tipo-info');
		const mensagemModalItem = document.getElementById('mensagem-modal-item');

		let modalItemModo = 'criar';
		let itemEditId = null;

		function sair() {
			limparSessao();
			window.location.href = 'index.html';
		}

		function setMensagem(texto, tipo) {
			mensagem.className = `message ${tipo || ''}`;
			mensagem.innerText = texto || '';
		}

		function aplicarPermissoesAdmin() {
			if (!isAdmin) {
				btnCriarItem.classList.add('is-hidden');
			}
		}

		function setMensagemModalItem(texto, tipo) {
			mensagemModalItem.className = `message ${tipo || ''}`;
			mensagemModalItem.innerText = texto || '';
		}

		function abrirModalItem() {
			if (!isAdmin) return;
			modalItemModo = 'criar';
			itemEditId = null;
			modalItemTitulo.innerText = 'Criar novo item';
			modalItemNome.value = '';
			modalItemDescricao.value = '';
			modalItemTipo.value = 'equipamento';
			modalItemPreco.value = '';
			modalItemMultiplicador.value = '';
			atualizarTipoInfo();
			setMensagemModalItem('', '');
			modalItem.classList.remove('is-hidden');
			modalItemNome.focus();
		}

		function abrirModalItemEditar(item) {
			if (!isAdmin) return;
			modalItemModo = 'editar';
			itemEditId = item.id;
			modalItemTitulo.innerText = 'Editar item';
			modalItemNome.value = item.nome || '';
			modalItemDescricao.value = item.descricao || '';
			modalItemTipo.value = item.tipo === 'auto_click' ? 'auto_click' : 'equipamento';
			const preco = Number(item.preco);
			modalItemPreco.value = Number.isFinite(preco) ? preco : '';
			const multiplicador = Number(item.multiplicador);
			modalItemMultiplicador.value = Number.isFinite(multiplicador) ? multiplicador : '';
			atualizarTipoInfo();
			setMensagemModalItem('', '');
			modalItem.classList.remove('is-hidden');
			modalItemNome.focus();
		}

		function fecharModalItem() {
			modalItem.classList.add('is-hidden');
			modalItemNome.value = '';
			modalItemDescricao.value = '';
			modalItemTipo.value = 'equipamento';
			modalItemPreco.value = '';
			modalItemMultiplicador.value = '';
			modalItemModo = 'criar';
			itemEditId = null;
			setMensagemModalItem('', '');
		}

		function atualizarTipoInfo() {
			if (modalItemTipo.value === 'auto_click') {
				modalItemMultiplicador.placeholder = 'Cliques por segundo (ex: 1.5)';
				modalItemTipoInfo.innerText = 'Auto clique adiciona cliques por segundo.';
				return;
			}
			modalItemMultiplicador.placeholder = 'Multiplicador (ex: 2.0)';
			modalItemTipoInfo.innerText = 'Multiplicador soma no ganho por clique.';
		}

		function criarLinhaVazia() {
			const row = document.createElement('tr');
			const cell = document.createElement('td');
			cell.colSpan = 4;
			cell.className = 'table-empty';
			cell.innerText = 'Nenhum item disponivel.';
			row.appendChild(cell);
			tabela.appendChild(row);
		}

		async function carregarLoja() {
			tabela.innerHTML = `
				<tr>
					<th>Item</th>
					<th>Descricao</th>
					<th>Preco</th>
					<th>Acoes</th>
				</tr>
			`;

			try {
				const itens = await apiFetch('/loja/itens');
				if (!itens.length) {
					criarLinhaVazia();
					return;
				}

				itens.forEach(item => {
					const row = document.createElement('tr');

					const nomeCell = document.createElement('td');
					nomeCell.innerText = item.nome;

					const descCell = document.createElement('td');
					descCell.innerText = item.descricao || '-';

					const precoCell = document.createElement('td');
					const preco = Number(item.preco);
					precoCell.innerText = Number.isFinite(preco) ? formatMoedas(preco) : item.preco;

					const acoesCell = document.createElement('td');
					const comprarBtn = document.createElement('button');
					comprarBtn.type = 'button';
					comprarBtn.className = 'btn-retro';
					comprarBtn.innerText = 'Comprar';
					comprarBtn.addEventListener('click', () => comprarItem(item.id, preco));

					acoesCell.appendChild(comprarBtn);
					if (isAdmin) {
						const editarBtn = document.createElement('button');
						editarBtn.type = 'button';
						editarBtn.className = 'btn-retro btn-primary';
						editarBtn.innerText = 'Editar';
						editarBtn.addEventListener('click', () => abrirModalItemEditar(item));
						acoesCell.appendChild(editarBtn);

						const deleteBtn = document.createElement('button');
						deleteBtn.type = 'button';
						deleteBtn.className = 'btn-retro btn-danger';
						deleteBtn.innerText = 'Deletar';
						deleteBtn.addEventListener('click', () => deletarItem(item.id));
						acoesCell.appendChild(deleteBtn);
					}

					row.appendChild(nomeCell);
					row.appendChild(descCell);
					row.appendChild(precoCell);
					row.appendChild(acoesCell);

					tabela.appendChild(row);
				});
			} catch (error) {
				criarLinhaVazia();
			}
		}

		async function comprarItem(itemId, preco) {
			setMensagem('', '');
			try {
				await apiFetch(`/inventario/comprar/${jogadorId}/${itemId}`, { method: 'POST' });
				if (Number.isFinite(preco)) {
					const saldoAtual = getSaldo();
					if (saldoAtual !== null) {
						const novoSaldo = saldoAtual - preco;
						setSaldo(novoSaldo);
						atualizarSaldoNaTela(novoSaldo);
					}
				}
				await carregarJogador();
				setMensagem('Item comprado com sucesso!', 'success');
			} catch (error) {
				setMensagem(error.message || 'Erro ao comprar.', 'error');
			}
		}

		async function confirmarItem() {
			if (!isAdmin) return;
			setMensagemModalItem('', '');
			const nome = modalItemNome.value.trim();
			const descricao = modalItemDescricao.value.trim();
			const tipo = modalItemTipo.value;
			const precoRaw = modalItemPreco.value.trim();
			const preco = Number(precoRaw);
			const multRaw = modalItemMultiplicador.value.trim();
			const multiplicador = multRaw ? Number(multRaw) : 1;
			const multFinal = Number.isFinite(multiplicador) && multiplicador > 0 ? multiplicador : 1;

			if (!nome) {
				setMensagemModalItem('Nome do item e obrigatorio.', 'error');
				return;
			}
			if (!precoRaw || !Number.isFinite(preco) || preco <= 0) {
				setMensagemModalItem('Preco invalido.', 'error');
				return;
			}

			try {
				if (modalItemModo === 'editar') {
					await apiFetch(`/loja/itens/${itemEditId}?jogador_id=${encodeURIComponent(jogadorId)}`, {
						method: 'PUT',
						body: {
							nome,
							descricao,
							preco,
							multiplicador: multFinal,
							tipo
						}
					});
					setMensagem('Item atualizado com sucesso.', 'success');
				} else {
					await apiFetch(`/loja/itens?jogador_id=${encodeURIComponent(jogadorId)}`, {
						method: 'POST',
						body: {
							nome,
							descricao,
							preco,
							multiplicador: multFinal,
							tipo,
							raridade: 'comum',
							vendivel: true
						}
					});
					setMensagem('Item criado com sucesso.', 'success');
				}
				fecharModalItem();
				carregarLoja();
			} catch (error) {
				const acao = modalItemModo === 'editar' ? 'salvar' : 'criar';
				setMensagemModalItem(error.message || `Erro ao ${acao} item.`, 'error');
			}
		}

		async function deletarItem(itemId) {
			if (!isAdmin) return;
			if (!confirm('Deseja deletar este item?')) return;
			try {
				const data = await apiFetch(`/loja/itens/${itemId}?jogador_id=${encodeURIComponent(jogadorId)}`, { method: 'DELETE' });
				setMensagem(data.mensagem || 'Item deletado com sucesso.', 'success');
				carregarLoja();
			} catch (error) {
				setMensagem(error.message || 'Erro ao deletar item.', 'error');
			}
		}

		aplicarPermissoesAdmin();
		modalItemTipo.addEventListener('change', atualizarTipoInfo);
		carregarLoja();
	</script>
</body>
</html>
