<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professor Clicker - Aula</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="flash-container">
        <div class="top-nav">
            <a href="game.html" class="btn-retro">Dar Aula</a>
            <a href="shop.html" class="btn-retro">Loja</a>
            <a href="inventory.html" class="btn-retro">Mochila</a>
            <a href="pokemon.html" class="btn-retro">Time Pokemon</a>
            <a href="tournament.html" class="btn-retro">Torneio Pokemon</a>
            <a href="friends.html" class="btn-retro">👥 Amigos</a>
            <a href="profile.html" class="btn-retro">Perfil</a>
            <button class="btn-retro btn-danger" type="button" onclick="sair()">Sair</button>
            <div class="saldo">Moedas: <span id="saldo-display">--</span></div>
        </div>

        <div class="content">
            <div class="panel" style="text-align: center;">
                <h2>Nivel: <span id="nivel-display">--</span></h2>
                <p>Progresso da Aula: <progress id="progresso-display" value="0" max="100"></progress></p>
                <p class="panel-note">Nivel e progresso ainda nao estao conectados ao servidor.</p>
            </div>

            <button id="btn-aula" class="clicker-btn" onclick="darAula()">DAR AULA!</button>
            <p id="mensagem" class="message"></p>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        verificarAutenticacao();
        atualizarSaldoNaTela(getSaldo());
        carregarJogador();

        const jogadorId = getJogadorId();

        async function darAula() {
            const btn = document.getElementById('btn-aula');
            btn.disabled = true;

            const msg = document.getElementById('mensagem');
            msg.className = 'message';
            msg.innerText = '';

            try {
                const data = await apiFetch(`/jogo/${jogadorId}/dar-aula`, { method: 'POST' });
                setSaldo(data.novo_saldo);
                atualizarSaldoNaTela(data.novo_saldo);
                msg.className = 'message success';
                msg.innerText = `+${data.ganho} moedas!`;
            } catch (error) {
                msg.className = 'message error';
                msg.innerText = error.message || 'Erro ao dar aula.';
            } finally {
                btn.disabled = false;
                setTimeout(() => { msg.innerText = ''; msg.className = 'message'; }, 1500);
            }
        }

        function sair() {
            limparSessao();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
