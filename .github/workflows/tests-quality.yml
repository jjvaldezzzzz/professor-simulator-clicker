name: Tests & Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          playwright install chromium

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432; do
            echo 'waiting for PostgreSQL...'
            sleep 1
          done

      - name: Run Unit Tests
        run: |
          pytest tests/unit -v --cov=app --cov-report=term-missing \
            --junit-xml=junit-unit.xml --html=report-unit.html --self-contained-html || true

      - name: Run Integration Tests
        run: |
          pytest tests/integration -v --cov=app --cov-report=term-missing \
            --junit-xml=junit-integration.xml --html=report-integration.html --self-contained-html || true

      - name: Run E2E Tests
        run: |
          pytest tests/e2e -v --tb=short \
            --junit-xml=junit-e2e.xml --html=report-e2e.html --self-contained-html || true
        continue-on-error: true

      - name: Generate Coverage Report
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term-missing \
            --cov-branch \
            --cov-fail-under=70 \
            --junit-xml=junit-all.xml || true

      - name: Run Pylint
        run: |
          pylint app --exit-zero --output-format=parseable > pylint-report.txt || true

      - name: Run Flake8
        run: |
          flake8 app --format=default > flake8-report.txt || true

      - name: Run Bandit
        run: |
          bandit -r app -f json > bandit-report.json || true

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-reports
          path: |
            htmlcov/
            report-*.html
            junit-*.xml
            pylint-report.txt
            flake8-report.txt
            bandit-report.json
            coverage.xml

      - name: Comment PR with Coverage
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            
            // Ler coverage.xml se existir
            let coverageComment = '';
            try {
              const coverage = fs.readFileSync('./coverage.xml', 'utf8');
              const match = coverage.match(/line-rate="([^"]+)"/);
              if (match) {
                const percent = (parseFloat(match[1]) * 100).toFixed(2);
                coverageComment = `\n📊 **Coverage**: ${percent}%`;
              }
            } catch (e) {
              console.log('Coverage file not found');
            }

            const comment = `## Test Results

            ✅ Tests completed!
            
            **Reports**:
            - [Unit Tests Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - [Integration Tests Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - [E2E Tests Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            ${coverageComment}
            
            View full artifacts in the [Actions tab](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}).`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  sonarqube:
    runs-on: ubuntu-latest
    needs: test
    if: always()
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download test artifacts
        uses: actions/download-artifact@v3
        with:
          name: test-reports
          path: ./

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        continue-on-error: true
        with:
          args: >
            -Dsonar.projectKey=professor-simulator-clicker
            -Dsonar.sources=app
            -Dsonar.tests=tests
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.python.pylint.reportPaths=pylint-report.txt
            -Dsonar.python.flake8.reportPaths=flake8-report.txt
            -Dsonar.python.bandit.reportPaths=bandit-report.json

  quality-gate:
    runs-on: ubuntu-latest
    needs: test
    if: always()
    
    steps:
      - uses: actions/checkout@v4

      - name: Download test artifacts
        uses: actions/download-artifact@v3
        with:
          name: test-reports
          path: ./

      - name: Check Coverage Threshold
        run: |
          if [ -f coverage.xml ]; then
            python3 << 'EOF'
            import xml.etree.ElementTree as ET
            
            tree = ET.parse('coverage.xml')
            root = tree.getroot()
            
            # Get line-rate
            line_rate = float(root.get('line-rate', '0'))
            coverage_percent = line_rate * 100
            
            print(f"Code Coverage: {coverage_percent:.2f}%")
            
            if coverage_percent < 70:
              print("❌ Coverage below 70% threshold!")
              exit(1)
            elif coverage_percent < 80:
              print("⚠️  Coverage below 80% target")
              exit(0)
            else:
              print("✅ Coverage meets target!")
              exit(0)
            EOF
          else
            echo "coverage.xml not found"
            exit 1
          fi

      - name: Check Test Results
        run: |
          if [ -f junit-all.xml ]; then
            echo "Test reports found"
            # Adicionar lógica para validar testes críticos
          fi
